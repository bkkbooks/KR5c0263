front:
  text: 天老神光經表薄四臣聞人不見形憑諸水鑑事不可預明其箝兆蓍灼是虛尚假精意水鑑雖徹資其目成故形以目窺而見微兆以識察而觀妙斯事畢舉孰可倣之如有一闕則難依據臣性識愚劣藝術淺薄覽於異書頗知至要只如目前者定近遠察是非辨青黃知善惡上觀乾象中測人情下鑒坤維斯等莫不皆由目中光也若能見之戰鬥出軍涉水陸即目下氣黑若光去目患難立至則上不能見輔星中不能辨親疏下不能觀萬物此神光去矣其不睹斯妙臨患之時夫何悮哉頗有云為兼以昏晦若能存神光於目眥察輔星於武曲則不勞蓍灼休咎預分未接兵戈前知勝負其文省而易教其理精而易通固可以去危就安轉禍為福是知高祖心動卒免迫人之謀趙襄馬驚懸知刺客之狀古來賢哲皆宗師曠晉平張良受黃石之要此乃傳行世代歷載既深文字或謬語有其繁臣竊不自揆輒次之以此成一軸號曰天老神光謹進於闕庭臣熟知陛下聖慮明暢妙理精通然臣令敢聞以繁聽覽臣恐陛下以此微細不納宸衷臣之愚直實以為保護聖躬莫不至斯道危難之代實以保身臨事便知吉凶固詳察不鄙芻蕘無任忠勤之誠謹冒死奉表謹獻以聞臣誠惶誠恐死罪死罪謹言
