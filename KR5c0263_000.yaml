body:
  text: 貞觀七年月右僕射衛國公臣李靖上表天老神光經右僕射衛國公李靖修晉平公問師曠曰凡人出行將兵攻擊勝負命之存亡可預知乎對曰須察北斗之星傍輔也若欲克戰將兵暮不見此輔星不可行也大凶若有疾不見限期將至平公曰天陰不見將何以明休咎對曰不見當視神光不見神光不可妄動平公曰神光若何對曰常居目中於陰暗處以指刺之目眥頭搖指可見其輔星者衆共視之獨不見者是輔已去必大凶夫人身疾病目不見者只在七日內死此道微密可謂獨見之明平公曰善哉乃刻玉版藏之於函常披覽之黃帝曰心動目瞬懸知性命吉凶天之明以日月斗為候人之明以目為候以心為主若能知之全身保命夫鼻目神合於心故先知察之心動目瞬鼻酸神光去者大凶或要知賊人姦人須存神光光青白者姦人黑者賊人凡行心動目瞬鼻酸者即存神光神光去者有賊在前一瞬一里前必有賊可備之凡行至他邑欲止住者先存神光無光者勿入其舍必有憂傷師曠曰光黃及赤而圓有德有喜白者有伏兵於人有喪青缺者有憂黑者有賊及病兵矣若居坐卧不安且存神光不見須急去凡夜卧要知吉凶可存神光將欲征伐者上觀星象中别神光矣若欲渡水宜可存之不見者不可渡也若出行不見者不可行也若臨食不見不可食若欲飲食時心動鼻酸目瞬光去同伴欲害己愼之若舌動脣瞬光去子欲殺父奴婢殺主心動臍瞬光去子欲害父心動光去肘瞬妾人為賊心動掌瞬光去者賊是親戚心動惕然光去弟欲害兄心動右足下瞬利行左足下瞬公中有事心動頰瞬光去賊是交友心動目瞬光去妻妾與外人私通欲來相害心動光去急離住處又存神光左目有光左路通右目有光右路通兩目皆有可往心動不樂避上下兵有相爭事若目無光耳無故鳴坐者急起行者急走有人欲來相害是為精魄藏耳左目瞬己身事右目瞬他人事鼻酸耳鳴怪憂立至夫上士死前五日光去魄亦去凡人魂藏於鼻魄藏於口故合於身神光出於目精氣合於神所去之處須謹占之昔軒轅欲崩光去十日周孔皆先五日近代烈士三日而已光藏於目聲藏於耳精藏於陰者而限期將至何為不在耳無聲目無光陰不起其賊主來隨明避之大吉岐伯曰於陰暗處以手掩目存神光青者憂白者兵赤者德黃者喜黑者凶劉根曰光白者亦有德甲乙日主目丙丁日主心戊己日主腹庚辛日主背壬癸日主踵以此日其有心動目瞬存光無者賊欲謀人可備禦之甲乙日心動者賊為人身小而長蒼色好言語丙丁日心動者賊為人壯赤色蓬頭廣頰戊己日心動者賊為人鼠肥肚大不言語髮黃庚辛日心動者賊為人廣眉大鼻能喜言語壬癸日心動者賊為人身長頭小黑色好漁獵若能備之則萬事必成避兵除害天自與之利矣光眉間五日一存命之長遠獨聞之聲為之耳鳴精神不調赤子大驚悲思不樂欲歸於天以手摶耳赤子還返耳鳴之時即存神光黃帝要祕專行全身保命凡人耳鳴聞叫唤啼呼及雷鼓聲若鼻中聞臭氣腥而並凶可齋誡沐浴暮向本星禹步三呼曰巨門神子輕門神子祿存子户錯子衡不云子霸治子大匱子常以此法言無殃矣若有難便呼其所屬星名云來救我三呼止第一午屬破軍二巳未屬武曲三申辰屬廉貞四卯酉屬文曲五寅戌屬祿存六丑亥屬巨門七子屬貪狼禹步法老氏云凡人住處宜存光察輔星武曲傍小星也見之則吉不見則凶亦內保百日見之則百目內無官災口舌患疾死亡故曰保百目若天陰不見輔星者於暗處存光若不見細推求四方尋之每辰及夜常能存之長生矣天神覆斗神呪用保身護命百年之榮壽非人勿傳呪曰團團告報四方天地日月此處行岡火急捉取鬼王人人縛勒攝取強邪吾今未覺不得分張騏驎萬隊盡散五方謹請二十八宿星官三十五星頭上立速速下來在臣傍年逆人符鬼專在此攔截作妖祥星官唯覆斗反縛叛逆人形口云急急急急便覆斗一步一星乾元亨利貞魁𩲃𩵄䰢魓𩳐魒告玄圖丕哉天道垂範顯乎然不可智知自古人知者其道昌不知者其道亡而況於常倫而己敢不量力度德銘心忘形窮索幽微編為圖籍如列諸掌依此行之至誠必應分位置席一一備載將來君子寶而祕之以貽後代勿示凡愚之人得之者固不在於外求修之者亦不在於他人陰符云宇宙在乎手萬化生乎身凡八萬三千一百晝三千一百星夜八萬星見以四斗星官每夜抽三斗在北斗下當直乾星求謁至尊宜用月初二目衙宿紙錢一貼狀紙七張鹿脯三楪酒三盞燈七盞香一炷面北方一行排右奉請乾星官降赴領受薄禮以應虔誠謹狀離星救危扶傾宜用成目亥時燈九盞香一炷餺飫五碗乳五盞三行排右奉請離星官降臨俯納丹誠以救顛躓謹狀丙星祈福宜用酉日申時飯兩碗并匙筯酒兩盞雜肉兩楪狀紙五張筆一管燈一盞右奉請丙星官降臨受納單獻特施福祐謹狀平星夷敵宜用危目丑時酒七盞香一炷紙錢三貼燈兩盞飯七碗右奉請平星官降止領受奠禮令遇敵必平逢危返安謹狀寅星官攻擊勝負宜用定目子時酒三盞香三炷紙錢一貼羊肉三楪燈九盞右奉請冥星官降赴俯賜領納使攻必剋擊必勝捷謹狀出星道途通達宜用定日辰時酒二盞肉飯食二分狀紙三張錢財一貼燈兩盞香一炷右奉請出星官降臨就座伏願無所滯礙道途通達謹狀定星安家保宅宜用平日戌時羊肉炙五串酒五盞狀紙五張紙錢一貼燈一盞香一炷右奉請定星官降臨受納伏願宅舍安寧祿祐延生謹狀瑞星應夢用天赦日亥時酒七盞鹿脯七楪狀紙七張紅綵二尺紙錢七貼燈二盞香一炷右奉請瑞星官應夢賢聖以將福祿謹狀元星求大官宜用己巳日巳時乳三楪雜綵各少許紙錢一貼紙三張筆三枝香一炷燈兩盞右奉請元星官降臨領納伏願仕宦清吉言發皆中謹狀正星攝心愜意用壬午日丑時乳粥四碗雜果子四楪酒四盞香燈各四右奉請正星官降臨領受伏願所求稱意謹狀顯星官祈官求名宜用丙子日亥時內飯一分紙錢一束狀紙一張香燈各一筆一枝右奉請顯星官降臨領受伏願祈官必應求名必遂謹狀月星祈陰德宜用寅日子時酒三盞狀紙四張白練素三尺素飯三分香一炷錢財十五貼燈一盞右奉請月星官降赴領受伏願所祈必應謹狀輔星安賤口宜用辰日戌時乳七盞燈一盞紙錢十三貼香一炷右奉請輔星官降赴領受伏願賤類福壽謹狀大白星祈方面主不揀日大凡申酉日為妙汗衫半臂一衫一袴一祙肚一襪一視一已上並須三歲孩子樣造右奉請大白星官降臨領受前件物并食酒乳等伏乞令祈官職必克所請謹狀燈席燈燈燈燈酒一滿碗乳一碗燈乳粥一碗飯一碗燈乳餅一錢財隨意燈狀紙二十張香三炷燈席燈燈燈以前件鋪設但依所畫字處著祭物直須嚴潔勿令前有豬狗及腥等物所排比尤宜在意所求必剋伏慮未慣者更備録立成奏狀儀範如後召啓十方一切得道應感神明某年某月某日州縣鄉里弟子某甲就某處奏納某星官君錢求某福令正爾燒香啓告願靈聖降下令臣所啓上達某星官前便執刀解穢云謹請東方青龍真氣入吾水中謹請南方赤龍真氣入吾水中謹請西方白龍真氣入吾水中謹請北方黑龍真氣入吾水中謹請中央黃龍真氣入吾水中謹請東方木官解穢吏九人謹請南方火官解穢吏三人謹請西方金官解穢吏七人謹請北方水官解穢吏五人謹請中央土官解穢吏十二人謹請天上地下解穢吏各十二人謹請解穢玉童洗浣玉女香湯使者請解天穢地穢人穢鬼穢沉尸白骨等穢但眼之所視耳之所聞速令大穢歸海小穢歸江不得遲遲當吾神氣者死背吾神氣者亡一穢不去者斬付魁魍急急如律令捻香三遍上香訖云第一上香供養南斗星官第二上香供養北斗星官第三上香供養十方一切得道奉請某星官慈悲降臨領受微禮上香上酒再拜臣聞至理幽冥啓必應感謹有文狀理宜申奏宣讀文狀如此三遍訖燒錢及雜果子撒了再拜祝右隨官並請沾賴以同歡悅某以卑微菲薄仰蒙降臨不勝欣悚臣向來所請情狀伏願采納記録詞誠臣以愚昧不間儀範啓言煩雜忓忤威靈並乞矜恕克如所願再拜奉送諸神祝文第一上香供養南斗星官第二上香供養北斗星官第三上香供養一切得道玉華散景金爐起煙香雲密羅上衝九天侍香玉女上聞帝前令臣長生永為真仙所啓所請咸乞如言又云隔居小人好道求靈常見尊儀願賜長生百二十年無諸災瘴敗中得成危中得安死中得生應住宅吉家眷安平如願之日即不勝虔懇之至稽首歡喜次宣狀三通次念北斗呪七遍奉請某星官慈悲降臨領受微禮臣聞至理幽冥啓必應感謹有文狀理宜申奏次燒錢及狀灑酒撒果右隨官並請沾賴以同歡悅臣以卑微輒申菲薄仰蒙降臨不勝欣悚臣某向來所請情狀伏願採納記録詞誠臣愚昧不間儀範啓言煩雜忓忤威靈並乞矜恕克如所願再拜送背建向破覆斗大月拇大指在前腰上及先進左足步之動岡小月拇小指在前腰上及先進右足步之動岡大月禹步先左小月禹步先右天老神光經
